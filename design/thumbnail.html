<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="./styles.css">
<style>html,body{margin:0}
.wrap{width:1280px;height:854px;display:flex;font-family:var(--font-display)}
.main{width:75%;height:100%;background:var(--charcoal-900);display:flex;align-items:center;justify-content:center}
.name{color:var(--parchment-100);font-weight:600;font-size:112px;line-height:1;letter-spacing:-0.03em;text-align:center}
.name em{font-style:italic;color:var(--gold-500)}
.strip{width:25%;height:100%;display:flex;flex-direction:column}
.strip div{flex:1}</style></head>
<body><div class="wrap">
<div class="main"><div class="name">Brian&nbsp;B.<br><em>Morgan</em></div></div>
<div class="strip">
<div style="background:var(--gold-500)"></div>
<div style="background:var(--sage-600)"></div>
<div style="background:var(--rust-600)"></div>
<div style="background:var(--blue-700)"></div>
</div>
</div></body></html>
