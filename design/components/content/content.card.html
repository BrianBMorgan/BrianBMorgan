<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);padding:22px;font-family:var(--font-sans)}
.wrap{display:flex;flex-direction:column;gap:18px}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const NS = window.BrianBMorganDesignSystem_219fa3;
const { Card, Tag, Badge, Stat, Eyebrow, Icon } = NS;
function Demo(){
  return <div className="wrap">
    <div className="row">
      <Tag tone="gold" filled>React</Tag><Tag tone="sage">Design systems</Tag><Tag tone="rust">Brand</Tag>
      <Tag tone="blue">Motion</Tag><Tag tone="neutral">Figma</Tag>
      <span style={{width:1,height:22,background:'var(--border-default)'}}></span>
      <Badge tone="success">Available for work</Badge><Badge tone="info" solid>Live</Badge><Badge tone="neutral">Archived</Badge>
    </div>
    <div className="cards">
      <Card variant="paper" padding="md" hoverable>
        <Eyebrow rule>Case study</Eyebrow>
        <h3 style={{margin:'8px 0 6px',fontSize:22}}>Rivet — brand & site</h3>
        <p style={{margin:0,fontSize:14,color:'var(--text-muted)'}}>Identity and design system for a fintech studio.</p>
      </Card>
      <Card variant="inverse" padding="md">
        <div style={{display:'flex',gap:28}}>
          <Stat value="12" label="Years" accent="var(--gold-400)"/>
          <Stat value="40+" label="Projects" accent="var(--parchment-100)"/>
          <Stat value="6" label="Awards" accent="var(--sage-300)"/>
        </div>
      </Card>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),100);
</script></body></html>
