<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);padding:24px;font-family:var(--font-sans)}
.wrap{display:flex;flex-direction:column;gap:22px}.row{display:flex;gap:20px;align-items:center;color:var(--charcoal-700)}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);width:70px}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const NS = window.BrianBMorganDesignSystem_219fa3;
const { Icon, Avatar } = NS;
const icons = ['arrow-up-right','github','linkedin','mail','map-pin','arrow-right','download','external-link','briefcase','pen-tool','layers','send'];
function Demo(){
  return <div className="wrap">
    <div className="row"><span className="lbl">Icons</span>{icons.map(n=><Icon key={n} name={n} size={22}/>)}</div>
    <div className="row"><span className="lbl">Avatars</span>
      <Avatar name="Brian Morgan" size="sm"/><Avatar name="Brian Morgan" size="md"/>
      <Avatar name="Brian Morgan" size="lg"/><Avatar name="Brian Morgan" size="xl"/>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),120);
</script></body></html>
