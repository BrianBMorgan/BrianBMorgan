<!-- @dsCard group="Colors" viewport="700x150" name="Rust Scale" subtitle="Warm energy / alert — 700 → 100" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.85}</style></head>
<body><div class="row"><div class="sw" style="background:var(--rust-700)"><b style="color:#fff">700</b><span style="color:#fff">#8A3C22</span></div><div class="sw" style="background:var(--rust-600)"><b style="color:#fff">600</b><span style="color:#fff">#A6482A</span></div><div class="sw" style="background:var(--rust-500)"><b style="color:#fff">500</b><span style="color:#fff">#BE5A38</span></div><div class="sw" style="background:var(--rust-300)"><b style="color:var(--charcoal-900)">300</b><span style="color:var(--charcoal-800)">#DFA488</span></div><div class="sw" style="background:var(--rust-100)"><b style="color:var(--charcoal-900)">100</b><span style="color:var(--charcoal-800)">#F1D9CC</span></div></div></body></html>
