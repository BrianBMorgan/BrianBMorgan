<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.85}</style></head>
<body><div class="row"><div class="sw" style="background:var(--blue-800)"><b style="color:#fff">800</b><span style="color:#fff">#1F3547</span></div><div class="sw" style="background:var(--blue-700)"><b style="color:#fff">700</b><span style="color:#fff">#274156</span></div><div class="sw" style="background:var(--blue-600)"><b style="color:#fff">600</b><span style="color:#fff">#345A76</span></div><div class="sw" style="background:var(--blue-500)"><b style="color:#fff">500</b><span style="color:#fff">#4A759B</span></div><div class="sw" style="background:var(--blue-300)"><b style="color:var(--charcoal-900)">300</b><span style="color:var(--charcoal-800)">#93B2C8</span></div><div class="sw" style="background:var(--blue-100)"><b style="color:var(--charcoal-900)">100</b><span style="color:var(--charcoal-800)">#D6E3EC</span></div></div></body></html>
