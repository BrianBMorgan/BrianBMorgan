<!-- @dsCard group="Colors" viewport="700x150" name="Semantic States" subtitle="Success, warning, danger, info — text on tint" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.85}</style></head>
<body><div class="row"><div class="sw" style="background:var(--sage-700)"><b style="color:#fff">Success</b><span style="color:#fff">sage-700</span></div><div class="sw" style="background:var(--gold-700)"><b style="color:#fff">Warning</b><span style="color:#fff">gold-700</span></div><div class="sw" style="background:var(--rust-600)"><b style="color:#fff">Danger</b><span style="color:#fff">rust-600</span></div><div class="sw" style="background:var(--blue-600)"><b style="color:#fff">Info</b><span style="color:#fff">blue-600</span></div></div></body></html>
