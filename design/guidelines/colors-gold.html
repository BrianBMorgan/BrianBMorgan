<!-- @dsCard group="Colors" viewport="700x150" name="Gold Scale" subtitle="Primary brass accent — 700 → 200" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.8}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--gold-700)"><b style="color:#fff">700</b><span style="color:#fff">#8A6A1E</span></div>
<div class="sw" style="background:var(--gold-600)"><b style="color:#fff">600</b><span style="color:#fff">#A9832C</span></div>
<div class="sw" style="background:var(--gold-500)"><b style="color:#fff">500</b><span style="color:#fff">#C09A3A</span></div>
<div class="sw" style="background:var(--gold-400)"><b style="color:var(--charcoal-900)">400</b><span style="color:var(--charcoal-800)">#D2B25E</span></div>
<div class="sw" style="background:var(--gold-200)"><b style="color:var(--charcoal-900)">200</b><span style="color:var(--charcoal-800)">#E8D6A0</span></div>
</div></body></html>
