<!-- @dsCard group="Colors" viewport="700x150" name="Core Palette" subtitle="Gold, sage, rust, deep blue on parchment & charcoal" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:10px}
.sw{flex:1;height:96px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-shadow:var(--shadow-xs)}
.sw b{font-size:11px;font-weight:600;letter-spacing:.02em}
.sw span{font-size:10px;opacity:.75}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--gold-600)"><b style="color:#fff">Gold</b><span style="color:#fff">#A9832C</span></div>
<div class="sw" style="background:var(--sage-600)"><b style="color:#fff">Sage</b><span style="color:#fff">#6C7A57</span></div>
<div class="sw" style="background:var(--rust-600)"><b style="color:#fff">Rust</b><span style="color:#fff">#A6482A</span></div>
<div class="sw" style="background:var(--blue-700)"><b style="color:#fff">Deep Blue</b><span style="color:#fff">#274156</span></div>
<div class="sw" style="background:var(--parchment-100)"><b style="color:var(--charcoal-800)">Parchment</b><span style="color:var(--charcoal-600)">#F6EFDF</span></div>
<div class="sw" style="background:var(--charcoal-900)"><b style="color:var(--parchment-100)">Charcoal</b><span style="color:var(--charcoal-300)">#201D19</span></div>
</div></body></html>
