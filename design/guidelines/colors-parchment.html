<!-- @dsCard group="Colors" viewport="700x150" name="Parchment Scale" subtitle="Warm neutral surfaces — 50 → 400" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.85}</style></head>
<body><div class="row"><div class="sw" style="background:var(--parchment-50)"><b style="color:var(--charcoal-900)">50</b><span style="color:var(--charcoal-800)">#FBF7EE</span></div><div class="sw" style="background:var(--parchment-100)"><b style="color:var(--charcoal-900)">100</b><span style="color:var(--charcoal-800)">#F6EFDF</span></div><div class="sw" style="background:var(--parchment-200)"><b style="color:var(--charcoal-900)">200</b><span style="color:var(--charcoal-800)">#EFE4CC</span></div><div class="sw" style="background:var(--parchment-300)"><b style="color:var(--charcoal-900)">300</b><span style="color:var(--charcoal-800)">#E4D5B4</span></div><div class="sw" style="background:var(--parchment-400)"><b style="color:var(--charcoal-900)">400</b><span style="color:var(--charcoal-800)">#D3BF95</span></div></div></body></html>
