<!-- @dsCard group="Colors" viewport="700x150" name="Charcoal Scale" subtitle="Warm near-black ink & deep surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-raised);padding:18px;font-family:var(--font-mono)}
.row{display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:7px;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:11px;font-weight:600}.sw span{font-size:9px;opacity:.85}</style></head>
<body><div class="row"><div class="sw" style="background:var(--charcoal-900)"><b style="color:#fff">900</b><span style="color:#fff">#201D19</span></div><div class="sw" style="background:var(--charcoal-800)"><b style="color:#fff">800</b><span style="color:#fff">#2B2721</span></div><div class="sw" style="background:var(--charcoal-700)"><b style="color:#fff">700</b><span style="color:#fff">#3A352D</span></div><div class="sw" style="background:var(--charcoal-600)"><b style="color:#fff">600</b><span style="color:#fff">#4E473C</span></div><div class="sw" style="background:var(--charcoal-500)"><b style="color:#fff">500</b><span style="color:#fff">#6B6353</span></div><div class="sw" style="background:var(--charcoal-400)"><b style="color:#fff">400</b><span style="color:#fff">#8C8474</span></div><div class="sw" style="background:var(--charcoal-300)"><b style="color:var(--charcoal-900)">300</b><span style="color:var(--charcoal-800)">#B0A895</span></div></div></body></html>
